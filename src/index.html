<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PetsCape — Adopt, Rescue, Donate</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Find your perfect pet companion. Browse animals for adoption, report lost & found pets, and support our shelter mission."
    />
    <meta name="theme-color" content="#0f766e" />

    <!-- PWA / Install prompt -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Apple PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PetsCape" />
    <link rel="apple-touch-icon" href="icons/icon-152x152.png" />

    <!-- Open Graph (looks good when sharing link) -->
    <meta property="og:title" content="PetsCape — Adopt, Rescue, Donate" />
    <meta
      property="og:description"
      content="Find your perfect pet companion and help animals in need."
    />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <!-- Polyfill: sockjs-client uses Node's 'global' — must be defined before Angular loads -->
    <script>window.global = window;</script>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
