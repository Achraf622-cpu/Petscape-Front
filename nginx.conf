server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 413 Fix: Allow larger image uploads
    client_max_body_size 50M;

    # ── WebSocket proxy (STOMP native WebSocket) ────────────────────────────────
    # ^~ prefix gives this location priority over regex locations
    location ^~ /ws {
        proxy_pass http://api:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Spring Boot REST API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Uploaded files (animal/report images) ───────────────────────────────────
    # ^~ gives this PRIORITY over the regex block below, so .png/.jpg in /uploads/
    # are served from the volume, not from the Angular dist folder.
    location ^~ /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # ── Static Angular assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Angular SPA routing ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
